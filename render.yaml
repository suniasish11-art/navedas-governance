services:
  - type: web
    name: navedas-gip
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: APP_PASSWORD
        sync: false   # set manually in Render dashboard
    autoDeploy: true
